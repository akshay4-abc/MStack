<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layered Boxes</title>
    <style>
        .outer {
            width: 400px;
            border: 5px solid rgb(220, 7, 7);
            padding: 20px;
            margin: 30px auto;
        }
        .middle {
            border: 4px dashed rgb(5, 193, 46);
            padding: 20px;

        }
        .inner {
            border:10px solid blueviolet;
            padding: 20px;
            
        }

    </style>
</head>
<body>
    <div class="outer">
        <div class="middle">
            <div class="inner">
                Layers done
            </div>
        </div>
    </div>    
</body>
</html>
